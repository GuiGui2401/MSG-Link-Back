; Configuration PHP personnalisée pour Weylo
; Ce fichier augmente les limites d'upload pour permettre l'envoi de stories

; Limite de mémoire
memory_limit = 512M

; Taille maximale des fichiers uploadés
upload_max_filesize = 50M

; Taille maximale du POST (doit être >= upload_max_filesize)
post_max_size = 50M

; Temps d'exécution maximum (en secondes)
max_execution_time = 300

; Temps maximum pour recevoir les données (en secondes)
max_input_time = 300

; Nombre maximum de fichiers uploadés
max_file_uploads = 20
